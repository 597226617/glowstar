

services:
  postgres:
    image: postgres:16-alpine
    container_name: glowstar-db
    environment:
      POSTGRES_DB: glowstar
      POSTGRES_USER: glowstar
      POSTGRES_PASSWORD: glowstar
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U glowstar"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
