version: '3.8'

services:
  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
      - ./ssl:/etc/nginx/ssl
    depends_on:
      - api
    restart: always

  # Node.js API Server
  api:
    build: ./server
    environment:
      - NODE_ENV=production
      - DATABASE_URL=sqlite:///data/glowstar.db
      - JWT_SECRET=${JWT_SECRET}
      - MAP_API_KEY=${MAP_API_KEY}
    volumes:
      - ./data:/app/data
    restart: always

  # SQLite Database (mounted volume)
  # Note: SQLite is embedded in the API server
  # This is just for data persistence

volumes:
  data:
